<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackd · Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
    .card { background: white; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 16px; padding: 2rem; width: 100%; max-width: 360px; }
    h1 { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
    .sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; margin-top: 14px; }
    input { width: 100%; padding: 10px 12px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; font-size: 15px; outline: none; font-family: inherit; }
    input:focus { border-color: #1D9E75; }
    .btn { width: 100%; padding: 12px; background: #1a1a1a; color: white; border: none; border-radius: 8px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 1.25rem; font-family: inherit; }
    .btn:hover { background: #333; }
    .error { font-size: 13px; color: #A32D2D; background: #FCEBEB; padding: 10px 12px; border-radius: 8px; margin-bottom: 1rem; }
    .footer { text-align: center; font-size: 13px; color: #888; margin-top: 1.25rem; }
    .footer a { color: #1D9E75; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <h1>Stackd</h1>
  <p class="sub">Sign in to your account</p>
  {% if error %}
  <div class="error">{{ error }}</div>
  {% endif %}
  <form method="post" action="/auth/login">
    <label>Username</label>
    <input type="text" name="username" autocomplete="username" required>
    <label>Password</label>
    <input type="password" name="password" autocomplete="current-password" required>
    <button class="btn" type="submit">Sign in</button>
  </form>
  <p class="footer">No account? <a href="/auth/register">Create one</a></p>
</div>
</body>
</html>
