<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackd · Welcome</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1.5rem; }
    .wrap { max-width: 380px; width: 100%; text-align: center; }
    .icon { width: 64px; height: 64px; background: #1a1a1a; border-radius: 16px; margin: 0 auto 1.5rem; display: flex; align-items: center; justify-content: center; font-size: 28px; }
    h1 { font-size: 26px; font-weight: 700; margin-bottom: 10px; }
    p { font-size: 15px; color: #666; line-height: 1.6; margin-bottom: 2rem; }
    .btn { display: block; padding: 14px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; text-decoration: none; font-family: inherit; }
    .steps { display: flex; justify-content: center; gap: 6px; margin-bottom: 2rem; }
    .step { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
    .step.active { background: #1D9E75; width: 20px; border-radius: 4px; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="icon">S</div>
  <h1>Welcome, {{ user.display_name }}</h1>
  <p>Let's set up your Stackd profile. You'll configure your supplements, food items, workout schedule, and oath. Takes about 3 minutes.</p>
  <div class="steps">
    <div class="step active"></div>
    <div class="step"></div>
    <div class="step"></div>
    <div class="step"></div>
    <div class="step"></div>
    <div class="step"></div>
  </div>
  <a class="btn" href="/onboarding/persona">Get started →</a>
</div>
</body>
</html>
