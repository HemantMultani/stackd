<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackd · Your Oath</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1.5rem; }
    .wrap { max-width: 480px; margin: 0 auto; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; padding-top: 1rem; }
    .sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
    .card { background: white; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
    label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; margin-top: 14px; }
    label:first-child { margin-top: 0; }
    input, textarea, select { width: 100%; padding: 10px 12px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; background: white; }
    textarea { resize: vertical; min-height: 80px; line-height: 1.5; }
    input:focus, textarea:focus { border-color: #1D9E75; }
    .oath-card { background: #1a1a1a; border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
    .oath-card label { color: rgba(255,255,255,0.6); }
    .oath-card input, .oath-card textarea { background: rgba(255,255,255,0.08); border-color: rgba(255,255,255,0.15); color: white; }
    .oath-card input::placeholder, .oath-card textarea::placeholder { color: rgba(255,255,255,0.3); }
    .btn { width: 100%; padding: 13px; background: #1D9E75; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 1.25rem; font-family: inherit; }
    .steps { display: flex; gap: 6px; margin-bottom: 1.5rem; }
    .step { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
    .step.active { background: #1D9E75; width: 20px; border-radius: 4px; }
    .step.done { background: #1D9E75; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="steps" style="padding-top:1rem;">
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step active"></div>
  </div>
  <h2>Your Oath</h2>
  <p class="sub">Commit to what you're building toward</p>

  <form method="post" action="/onboarding/oath">
    <div class="oath-card">
      <label>Oath title</label>
      <input type="text" name="title"
             placeholder="e.g. 6 Month Apex Oath" required>
      <label>Your intention — why are you doing this?</label>
      <textarea name="intention"
        placeholder="Build products, reach Silicon Valley talent level, become physically apex."
        required></textarea>
      <label>Duration (days)</label>
      <input type="number" name="duration_days" value="180" min="30" max="365">
    </div>

    <div class="card">
      <label style="margin-top:0;font-weight:500;">Milestones (optional)</label>
      <input type="text" name="milestone_1" placeholder="e.g. Ship 3 products" style="margin-top:8px;">
      <input type="text" name="milestone_2" placeholder="e.g. Consistent routine for 90 days" style="margin-top:8px;">
      <input type="text" name="milestone_3" placeholder="e.g. Reach SV skill level" style="margin-top:8px;">
    </div>

    <button class="btn" type="submit">Begin my oath →</button>
  </form>
</div>
</body>
</html>
