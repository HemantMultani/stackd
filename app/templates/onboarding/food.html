<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Stackd · Food items</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f0; min-height: 100vh; padding: 1.5rem; }
    .wrap { max-width: 480px; margin: 0 auto; }
    h2 { font-size: 22px; font-weight: 700; margin-bottom: 4px; padding-top: 1rem; }
    .sub { font-size: 14px; color: #888; margin-bottom: 1.5rem; }
    .card { background: white; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 14px; padding: 1.25rem; margin-bottom: 1rem; }
    .food-row { display: grid; grid-template-columns: 1fr 70px 90px; gap: 8px; margin-bottom: 10px; }
    .food-row:last-child { margin-bottom: 0; }
    input, select { width: 100%; padding: 9px 12px; border: 0.5px solid rgba(0,0,0,0.15); border-radius: 8px; font-size: 14px; outline: none; font-family: inherit; background: white; }
    input:focus, select:focus { border-color: #1D9E75; }
    .add-btn { width: 100%; padding: 10px; border: 0.5px dashed rgba(0,0,0,0.2); border-radius: 8px; background: transparent; font-size: 14px; color: #888; cursor: pointer; font-family: inherit; margin-top: 4px; }
    .add-btn:hover { border-color: #1D9E75; color: #1D9E75; }
    .btn { width: 100%; padding: 13px; background: #1a1a1a; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 500; cursor: pointer; margin-top: 1.25rem; font-family: inherit; }
    .col-label { font-size: 11px; color: #aaa; text-align: center; margin-bottom: 6px; }
    .steps { display: flex; gap: 6px; margin-bottom: 1.5rem; }
    .step { width: 8px; height: 8px; border-radius: 50%; background: #ddd; }
    .step.active { background: #1D9E75; width: 20px; border-radius: 4px; }
    .step.done { background: #1D9E75; }
  </style>
</head>
<body>
<div class="wrap">
  <div class="steps" style="padding-top:1rem;">
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step done"></div>
    <div class="step active"></div>
    <div class="step"></div>
  </div>
  <h2>Food items</h2>
  <p class="sub">Items you track daily for protein</p>

  <form method="post" action="/onboarding/food">
    <div class="card" id="food-list">
      <div style="display:grid;grid-template-columns:1fr 70px 90px;gap:8px;margin-bottom:6px;">
        <div class="col-label">Item</div>
        <div class="col-label">Protein (g)</div>
        <div class="col-label">Meal</div>
      </div>
      <div class="food-row">
        <input type="text" name="names" placeholder="e.g. 2 whole eggs">
        <input type="number" name="proteins" placeholder="14" min="0" step="0.5">
        <select name="meal_times">
          {% for m in meal_times %}
          <option value="{{ m }}">{{ m }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <button type="button" class="add-btn" onclick="addRow()">+ Add food item</button>
    <button class="btn" type="submit">Continue →</button>
  </form>
</div>
<script>
  const meals = {{ meal_times | tojson }};
  function addRow() {
    const list = document.getElementById('food-list');
    const row = document.createElement('div');
    row.className = 'food-row';
    row.innerHTML = `
      <input type="text" name="names" placeholder="Food item">
      <input type="number" name="proteins" placeholder="0" min="0" step="0.5">
      <select name="meal_times">
        ${meals.map(m => `<option value="${m}">${m}</option>`).join('')}
      </select>`;
    list.appendChild(row);
  }
</script>
</body>
</html>
